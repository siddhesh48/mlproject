<!DOCTYPE html>
<html>
<head>
    <title>Student Performance Predictor</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body class="container mt-5">

    <h1 class="text-center mb-4"> Student Performance Predictor</h1>

    <form action="/predictdata" method="post" class="card p-4 shadow">

        <div class="mb-3">
            <label>Gender</label>
            <select name="gender" class="form-control">
                <option value="male">Male</option>
                <option value="female">Female</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Race / Ethnicity</label>
            <select name="ethnicity" class="form-control">
                <option value="group A">Group A</option>
                <option value="group B">Group B</option>
                <option value="group C">Group C</option>
                <option value="group D">Group D</option>
                <option value="group E">Group E</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Parental Education</label>
            <select name="parental_level_of_education" class="form-control">
                <option value="some high school">Some High School</option>
                <option value="high school">High School</option>
                <option value="some college">Some College</option>
                <option value="associate's degree">Associate Degree</option>
                <option value="bachelor's degree">Bachelor's Degree</option>
                <option value="master's degree">Master's Degree</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Lunch</label>
            <select name="lunch" class="form-control">
                <option value="standard">Standard</option>
                <option value="free/reduced">Free/Reduced</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Test Preparation Course</label>
            <select name="test_preparation_course" class="form-control">
                <option value="none">None</option>
                <option value="completed">Completed</option>
            </select>
        </div>

        <div class="mb-3">
            <label>Reading Score</label>
            <input type="number" name="reading_score" class="form-control" required>
        </div>

        <div class="mb-3">
            <label>Writing Score</label>
            <input type="number" name="writing_score" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-primary w-100">Predict</button>

    </form>

    {% if results %}
    <div class="alert alert-success mt-4 text-center">
        <h4>Predicted Math Score: {{ results }}</h4>
    </div>
    {% endif %}

</body>
</html>
